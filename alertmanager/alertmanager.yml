global:
  resolve_timeout: 30s

route:
  receiver: observability-webhook
  group_by: [alertname, service, component]
  group_wait: 2s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: observability-webhook
    webhook_configs:
      - url: http://alert-webhook:18082/alerts
        send_resolved: true
        timeout: 5s

inhibit_rules:
  - source_matchers:
      - alertname="BusinessDatabaseUnavailable"
    target_matchers:
      - alertname="BusinessDatabaseSlow"
    equal: [service, component]
