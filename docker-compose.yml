name: observability-lab

services:
  app:
    build: .
    environment:
      HOST: 0.0.0.0
      PORT: 18080
      STATE_FILE: /app/data/failure-mode
      DB_HOST: business-db
      DB_PORT: 3306
      DB_NAME: orders_app
      DB_USER: orders_app
      DB_PASSWORD: ${MYSQL_ORDERS_PASSWORD}
    ports:
      - "18080:18080"
    volumes:
      - app-state:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      business-db:
        condition: service_healthy
    restart: unless-stopped
    networks: [observability]

  business-db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ORDERS_ROOT_PASSWORD}
      MYSQL_DATABASE: orders_app
      MYSQL_USER: orders_app
      MYSQL_PASSWORD: ${MYSQL_ORDERS_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - business-db-data:/var/lib/mysql
      - ./business-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [observability]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: ${MYSQL_ZABBIX_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --log_bin_trust_function_creators=1
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks: [observability]

  zabbix-server:
    image: zabbix/zabbix-server-mysql:alpine-7.0-latest
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: ${MYSQL_ZABBIX_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ZBX_STARTPOLLERS: 10
      ZBX_STARTHTTPPOLLERS: 5
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "10051:10051"
    restart: unless-stopped
    networks: [observability]

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-7.0-latest
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: ${MYSQL_ZABBIX_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Sao_Paulo
    depends_on:
      mysql:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks: [observability]

  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    environment:
      ZBX_HOSTNAME: lab-target
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_ACTIVE: zabbix-server
    depends_on: [zabbix-server]
    restart: unless-stopped
    networks: [observability]

  snmp-target:
    build: ./snmp
    hostname: lab-snmp-target
    restart: unless-stopped
    networks: [observability]

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks: [observability]

  loki:
    image: grafana/loki:3.7.2
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-config.file=/etc/loki/loki.yml", "-verify-config=true"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [observability]

  alloy:
    image: grafana/alloy:v1.16.2
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks: [observability]

  grafana:
    image: grafana/grafana:12.4.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus, loki, zabbix-web]
    restart: unless-stopped
    networks: [observability]

  zabbix-bootstrap:
    image: node:22-alpine
    working_dir: /bootstrap
    command: ["node", "configure-zabbix.js"]
    volumes:
      - ./bootstrap:/bootstrap:ro
    depends_on: [zabbix-web, zabbix-agent2, snmp-target, app]
    restart: "no"
    networks: [observability]

volumes:
  app-state:
  business-db-data:
  mysql-data:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:

networks:
  observability:
    driver: bridge
